<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vir2ose-Radio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- iOS / Apple PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="vir2oseRadio">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
</head>
<body>

    <!-- Full-Screen Control Deck über der gerenderten Grafik -->
    <div class="player-container">
        <div class="control-deck">
            <div id="date-widget" class="date-widget"></div>
            
            <button id="btnStop" class="hotspot" aria-label="Stop"></button>
            <button id="btnPause" class="hotspot" aria-label="Pause"></button>
            <button id="playBtn" class="hotspot hotspot-main-coin" aria-label="Play / Pause"></button>
            
            <div id="time-widget" class="time-widget"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

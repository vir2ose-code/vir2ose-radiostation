<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vir2ose-Radio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>

    <!-- Full-Screen Control Deck über der gerenderten Grafik -->
    <div class="player-container">
        <div class="control-deck">
            <button id="btnStop" class="hotspot" aria-label="Stop"></button>
            <button id="btnPause" class="hotspot" aria-label="Pause"></button>
            <button id="playBtn" class="hotspot hotspot-main-coin" aria-label="Play / Pause"></button>
        </div>
    </div>

    <!-- Uhrzeit und Datum -->
    <div id="clock-widget" class="clock-widget"></div>

    <script src="app.js"></script>
</body>
</html>
